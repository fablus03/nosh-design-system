<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>nosh サインビルダー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #f0f0f0; }
    .app { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }

    /* 左パネル */
    .panel { background: #fff; border-right: 1px solid #ddd; overflow-y: auto; padding: 16px; }
    .panel h1 { font-size: 14px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #333; }
    .panel h2 { font-size: 10px; color: #999; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: .5px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 2px; }
    .panel select, .panel > input { width: 100%; padding: 5px 7px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; margin-bottom: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    /* ブロック追加ボタン */
    .add-btns { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
    .add-btn { padding: 3px 8px; border: 1px solid #ddd; border-radius: 3px; background: #fff; cursor: pointer; font-size: 10px; }
    .add-btn:hover { background: #f5f5f5; }

    /* ブロックカード */
    .bk { border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 4px; padding: 4px 6px; font-size: 11px; }
    .bk-head { display: flex; align-items: center; gap: 3px; }
    .bk-head span { flex: 1; font-weight: 600; }
    .bk-head button { background: none; border: none; cursor: pointer; font-size: 10px; color: #666; }
    .bk-head .del { color: #c00; font-size: 12px; }
    .bk textarea, .bk input[type="text"], .bk input[type="url"] { width: 100%; padding: 3px 5px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; margin-top: 3px; resize: vertical; }
    .bk textarea { height: 30px; }
    .bk-opts { display: flex; align-items: center; gap: 3px; margin-top: 3px; font-size: 10px; color: #888; flex-wrap: wrap; }
    .bk-opts input[type="number"] { width: 36px; padding: 1px 3px; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; }
    .tbtn { border: none; border-radius: 3px; font-size: 9px; padding: 2px 6px; cursor: pointer; }
    .tbtn.on { background: #333; color: #fff; }
    .tbtn.off { background: #e8e8e8; color: #888; }

    /* アクション */
    .actions { margin-top: 12px; display: flex; gap: 6px; }
    .btn { flex: 1; padding: 7px; border: none; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #333; color: #fff; }
    .btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }

    /* プレビュー */
    .preview { background: #e0e0e0; overflow: auto; }
    .preview iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>
<!-- パスワードロック画面 -->
<div id="lockScreen" style="position:fixed;inset:0;background:#fff;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;">
    <div style="font-size:13px;font-weight:700;margin-bottom:16px;color:#333;">nosh サインビルダー</div>
    <input id="pwInput" type="password" placeholder="パスワード" style="padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:13px;width:200px;" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()" style="margin-left:6px;padding:8px 16px;border:none;border-radius:4px;background:#333;color:#fff;font-size:12px;cursor:pointer;">入る</button>
    <div id="pwErr" style="color:#c00;font-size:11px;margin-top:8px;display:none;">パスワードが違います</div>
  </div>
</div>
<script>
function unlock(){
  if(document.getElementById('pwInput').value==='nosh2026'){
    document.getElementById('lockScreen').style.display='none';
    sessionStorage.setItem('nosh_auth','1');
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}
if(sessionStorage.getItem('nosh_auth')==='1') document.getElementById('lockScreen').style.display='none';
</script>

<div class="app">
  <div class="panel">
    <h1>nosh サインビルダー</h1>

    <h2>サイズ</h2>
    <select id="sizeType" oninput="render()">
      <option value="preset">規定サイズ</option>
      <option value="custom">指定サイズ</option>
      <option value="cutting">カッティングシート</option>
    </select>
    <div id="presetSize">
      <select id="preset" oninput="render()">
        <option value="A4-tate">A4 縦 (210×297)</option>
        <option value="A4-yoko">A4 横 (297×210)</option>
        <option value="A3-tate">A3 縦 (297×420)</option>
        <option value="A3-yoko">A3 横 (420×297)</option>
      </select>
    </div>
    <div id="customSize" style="display:none;">
      <div class="row">
        <div><label>幅mm</label><input type="number" id="customW" value="200" oninput="render()"></div>
        <div><label>高さmm</label><input type="number" id="customH" value="200" oninput="render()"></div>
      </div>
    </div>

    <h2>背景</h2>
    <select id="bg" oninput="render()">
      <option value="white-back">白</option>
      <option value="green-back">緑</option>
    </select>

    <h2>コンテンツ（追加して並べる）</h2>
    <div class="add-btns">
      <div class="add-btn" onclick="add('title')">タイトル</div>
      <div class="add-btn" onclick="add('article')">本文</div>
      <div class="add-btn" onclick="add('list')">箇条書き</div>
      <div class="add-btn" onclick="add('img')">写真</div>
      <div class="add-btn" onclick="add('picto')">ピクト</div>
      <div class="add-btn" onclick="add('table')">表</div>
      <div class="add-btn" style="background:#eef;" onclick="add('rbox-start')">枠開始</div>
      <div class="add-btn" style="background:#eef;" onclick="add('rbox-end')">枠終了</div>
    </div>
    <div id="blocks"></div>

    <h2>ロゴ</h2>
    <div class="row">
      <div><label>形状</label><select id="logoType" oninput="render()"><option value="type-none">マークのみ</option><option value="type-side">横並び</option><option value="type-under">縦並び</option></select></div>
      <div><label>表示</label><select id="logoOn" oninput="render()"><option value="on">あり</option><option value="off">なし</option></select></div>
    </div>
    <div class="row" style="margin-top:4px;">
      <div><label>下 (mm)</label><input type="number" id="logoBottom" value="" placeholder="auto" oninput="render()"></div>
      <div><label>右 (mm)</label><input type="number" id="logoRight" value="" placeholder="auto" oninput="render()"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="savePDF()">PDF保存</button>
      <button class="btn btn-outline" onclick="copyHTML()">HTMLコピー</button>
    </div>
  </div>
  <div class="preview"><iframe id="pf"></iframe></div>
</div>

<script>
let blocks = [], uid = 0;
const PH = 'https://placehold.co/600x400/eee/999?text=PHOTO';

/* ===== ブロック追加 ===== */
function add(type) {
  const id = ++uid;
  let d = { id, type, width: '100' }; // 全ブロックにwidth
  switch (type) {
    case 'title':    d.text='タイトル'; d.fontSize=''; d.align='left'; d.weight='bold'; d.padTop='0.3'; d.padBottom='0.3'; break;
    case 'article':  d.text='ここにコンテンツ内容が入ります。'; d.fontSize=''; d.align='left'; d.weight='normal'; d.padTop='0.3'; d.padBottom='0.3'; break;
    case 'list':     d.items=['箇条書き内容その1','箇条書き内容その2']; d.fontSize=''; d.align='left'; break;
    case 'img':      d.src=PH; break;
    case 'img-cap':  d.src=PH; d.caption='説明テキスト'; d.fontSize=''; break;
    case 'picto':    break;
    case 'table':    d.rows = [['見出し1','内容1'],['見出し2','内容2'],['見出し3','内容3']]; d.fontSize = ''; d.cellPad = ''; break;
    case 'rbox-start': d.boxClass='box-white'; break;
    case 'rbox-end': break;
  }
  blocks.push(d);
  ui(); render();
}

function rm(id) { blocks = blocks.filter(b => b.id !== id); ui(); render(); }
function mv(id, dir) {
  const i = blocks.findIndex(b => b.id === id), j = i + dir;
  if (j < 0 || j >= blocks.length) return;
  [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
  ui(); render();
}
function set(id, k, v) { blocks.find(b => b.id === id)[k] = v; render(); }
function setRow(id, row, col, val) { blocks.find(x => x.id === id).rows[row][col] = val; render(); }
function rmRow(id, row) { blocks.find(x => x.id === id).rows.splice(row, 1); ui(); render(); }
function addRow(id) { blocks.find(x => x.id === id).rows.push(['見出し','内容']); ui(); render(); }
function tog(id, k, a, b) { const bl = blocks.find(x => x.id === id); bl[k] = bl[k] === a ? b : a; ui(); render(); }

/* ===== UI描画 ===== */
function ui() {
  const el = document.getElementById('blocks');
  let depth = 0;
  el.innerHTML = blocks.map(b => {
    if (b.type === 'rbox-end') depth = Math.max(0, depth - 1);

    const labels = { title:'タイトル', article:'本文', list:'箇条書き', img:'写真', picto:'ピクト', table:'表', 'rbox-end':'/ 枠終了' };
    const label = b.type === 'rbox-start' ? '枠（' + (b.boxClass==='box-green'?'緑':'白') + '）' : (labels[b.type] || b.type);

    // 幅ボタン
    const hasWidth = !['rbox-start','rbox-end'].includes(b.type);
    const wBtn = hasWidth ? ['100','50','33'].map(w =>
      `<button class="tbtn ${b.width===w?'on':'off'}" onclick="set(${b.id},'width','${w}');ui()">${w}%</button>`
    ).join('') : '';

    // 配置・太字
    const aBtn = b.align !== undefined ? `<button class="tbtn ${b.align==='center'?'on':'off'}" onclick="tog(${b.id},'align','center','left')">${b.align==='center'?'中央':'左'}</button>` : '';
    const bBtn = b.weight !== undefined ? `<button class="tbtn ${b.weight==='bold'?'on':'off'}" style="font-weight:bold" onclick="tog(${b.id},'weight','bold','normal')">B</button>` : '';

    // r-box色切替
    const rBtn = b.type === 'rbox-start' ? `<button class="tbtn on" onclick="tog(${b.id},'boxClass','box-green','box-white');ui();render()">色</button>` : '';

    // 入力欄
    let inp = '';
    if (b.type==='title' || b.type==='article')
      inp = `<textarea oninput="set(${b.id},'text',this.value)">${esc(b.text)}</textarea>`;
    else if (b.type==='list')
      inp = `<textarea oninput="set(${b.id},'items',this.value.split('\\n').filter(s=>s))" placeholder="改行区切り">${(b.items||[]).join('\n')}</textarea>`;
    else if (b.type==='img')
      inp = `<input type="text" oninput="set(${b.id},'src',this.value)" value="${esc(b.src)}" placeholder="画像URL">`;
    else if (b.type==='table') {
      inp = (b.rows||[]).map((r,i) =>
        `<div style="display:flex;gap:3px;margin-top:3px;align-items:center;">
          <input type="text" oninput="setRow(${b.id},${i},0,this.value)" value="${esc(r[0])}" placeholder="見出し" style="width:30%;">
          <textarea oninput="setRow(${b.id},${i},1,this.value)" placeholder="内容（改行可）" style="width:60%;height:24px;resize:vertical;">${esc(r[1])}</textarea>
          <button onclick="rmRow(${b.id},${i})" style="background:none;border:none;cursor:pointer;color:#c00;font-size:11px;">×</button>
        </div>`
      ).join('') + `<button onclick="addRow(${b.id})" style="margin-top:3px;background:none;border:1px solid #ddd;border-radius:3px;padding:2px 8px;font-size:10px;cursor:pointer;">+ 行追加</button>`;
    }

    // オプション行
    let opts = '';
    const parts = [];
    if (b.fontSize !== undefined) parts.push(`文字<input type="number" oninput="set(${b.id},'fontSize',this.value)" value="${b.fontSize}" placeholder="auto">mm`);
    if (b.cellPad !== undefined) parts.push(`セル高<input type="number" step="0.1" oninput="set(${b.id},'cellPad',this.value)" value="${b.cellPad}" placeholder="auto">em`);
    if (b.padTop !== undefined) parts.push(`上<input type="number" step="0.1" oninput="set(${b.id},'padTop',this.value)" value="${b.padTop}">下<input type="number" step="0.1" oninput="set(${b.id},'padBottom',this.value)" value="${b.padBottom}">em`);
    if (parts.length) opts = `<div class="bk-opts">${parts.join(' ')}</div>`;

    const indent = depth > 0 ? 'margin-left:12px;border-left:3px solid #ccc;' : '';
    const bg = b.type==='rbox-start'||b.type==='rbox-end' ? '#eef' : '#fafafa';
    const html = `<div class="bk" style="background:${bg};${indent}">
      <div class="bk-head">
        <button onclick="mv(${b.id},-1)">▲</button><button onclick="mv(${b.id},1)">▼</button>
        <span>${label}</span>
        ${wBtn}${aBtn}${bBtn}${rBtn}
        <button class="del" onclick="rm(${b.id})">×</button>
      </div>
      ${inp}${opts}
    </div>`;
    if (b.type === 'rbox-start') depth++;
    return html;
  }).join('');
}

/* ===== HTML生成 ===== */
function buildHTML() {
  const sizeType = document.getElementById('sizeType').value;
  const bg = document.getElementById('bg').value;
  const logoType = document.getElementById('logoType').value;
  const logoOn = document.getElementById('logoOn').value === 'on';
  const logoBg = bg === 'green-back' ? 'is-green-bg' : 'is-white-bg';

  let sizeAttr = '', sizeStyle = '';
  if (sizeType === 'preset') {
    sizeAttr = `id="${document.getElementById('preset').value}"`;
  } else if (sizeType === 'custom') {
    const w = document.getElementById('customW').value, h = document.getElementById('customH').value;
    sizeStyle = ` style="--base-width:${w}mm;--base-height:${h}mm;--short-side:${Math.min(w,h)}mm;"`;
  } else {
    sizeStyle = ' style="width:fit-content;height:fit-content;padding:20mm;--short-side:210mm;--space-l:9.45mm;--space-m:6.3mm;--space-s:3.15mm;"';
  }

  // flexコンテナでブロックを並べる
  let html = blocks.map(b => {
    const sz = b.fontSize ? `font-size:${b.fontSize}mm;` : '';
    const w = b.width || '100';
    const flexBasis = w === '100' ? '100%' : w === '50' ? 'calc(50% - var(--space-m) / 2)' : w === '33' ? 'calc(33.33% - var(--space-m) * 2 / 3)' : '100%';
    const wrapStyle = !['rbox-start','rbox-end'].includes(b.type) ? `flex:0 0 ${flexBasis};min-width:0;max-width:${flexBasis};` : '';

    switch (b.type) {
      case 'title': {
        const a = b.align==='center' ? 'text-align:center;' : '';
        const wt = b.weight==='normal' ? 'font-weight:normal;' : '';
        const pt = b.padTop ? `padding-top:${b.padTop}em;` : '';
        const pb = b.padBottom ? `padding-bottom:${b.padBottom}em;` : '';
        const st = `${wrapStyle}${a}${sz}${wt}${pt}${pb}`;
        return `<p class="title"${st?` style="${st}"`:''}>` + b.text.split('\n').map(l=>esc(l)).join('<br>') + '</p>';
      }
      case 'article': {
        const a = b.align==='center' ? 'text-align:center;' : '';
        const wt = b.weight==='bold' ? 'font-weight:bold;' : '';
        const pt = b.padTop ? `padding-top:${b.padTop}em;` : '';
        const pb = b.padBottom ? `padding-bottom:${b.padBottom}em;` : '';
        const st = `${wrapStyle}${a}${sz}${wt}${pt}${pb}`;
        return `<p class="article"${st?` style="${st}"`:''}>` + b.text.split('\n').map(l=>esc(l)).join('<br>') + '</p>';
      }
      case 'list': {
        const a = b.align==='center' ? 'text-align:center;' : '';
        const st = `${wrapStyle}${a}${sz}`;
        return `<ul${st?` style="${st}"`:''}>` + (b.items||[]).map(i=>`<li>${esc(i)}</li>`).join('') + '</ul>';
      }
      case 'img': {
        const st = wrapStyle;
        return `<div class="img-block"${st?` style="${st}"`:''}>` + `<img src="${esc(b.src)}" alt="">` + '</div>';
      }
      case 'img-cap': {
        const st = wrapStyle;
        const capSt = sz ? ` style="${sz}"` : '';
        return `<div${st?` style="${st}"`:''}>` + `<div class="img-block"><img src="${esc(b.src)}" alt=""></div>` + `<p class="article"${capSt}>${esc(b.caption||'')}</p></div>`;
      }
      case 'picto': {
        const st = wrapStyle;
        return `<div class="picto-block"${st?` style="${st}"`:''}>` + '<svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="8" fill="none" stroke="currentColor" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-size="14" fill="currentColor">ICON</text></svg></div>';
      }
      case 'table': {
        const cp = b.cellPad ? `--cell-pad:${b.cellPad}em;` : '';
        const st = wrapStyle + sz + cp;
        const cellSt = b.cellPad ? ` style="padding-top:${b.cellPad}em;padding-bottom:${b.cellPad}em;"` : '';
        const rows = (b.rows||[]).map(r => `<tr><th${cellSt}>${esc(r[0])}</th><td${cellSt}>${r[1].split('\n').map(l=>esc(l)).join('<br>')}</td></tr>`).join('');
        return `<table class="table_design"${st?` style="${st}"`:''}>` + `<tbody>${rows}</tbody></table>`;
      }
      case 'rbox-start': return `<div class="r-box ${b.boxClass}"><div style="display:flex;flex-wrap:wrap;align-items:start;column-gap:var(--space-m);">`;
      case 'rbox-end': return '</div></div>';
    }
  }).join('\n');

  let content = html + '\n';
  if (logoOn) {
    const lb = document.getElementById('logoBottom').value;
    const lr = document.getElementById('logoRight').value;
    const logoPos = (lb ? `bottom:${lb}mm;` : '') + (lr ? `right:${lr}mm;` : '');
    content += `<div class="nosh-logo ${logoType} ${logoBg}"${logoPos?` style="${logoPos}"`:''}>` + `\n${LOGO_SVG}\n</div>\n`;
  }

  // paper-blockにflex-wrapを追加
  return `<div ${sizeAttr} class="paper-block ${bg}"${sizeStyle}>\n<div style="display:flex;flex-wrap:wrap;align-items:start;column-gap:var(--space-m);">\n${content}</div>\n</div>`;
}

function buildFull() {
  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><link rel="stylesheet" href="sign.css"></head><body style="background:#e0e0e0;display:flex;justify-content:center;padding:30px;margin:0;">${buildHTML()}</body></html>`;
}

/* ===== レンダー ===== */
function render() {
  const st = document.getElementById('sizeType').value;
  document.getElementById('presetSize').style.display = st==='preset' ? '' : 'none';
  document.getElementById('customSize').style.display = st==='custom' ? '' : 'none';
  document.getElementById('pf').srcdoc = buildFull();
}

function copyHTML() {
  fetch('sign.css').then(r=>r.text()).then(css=>{
    const html = buildHTML();
    const full = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>${css}</style></head><body style="background:#e0e0e0;display:flex;justify-content:center;padding:30px;margin:0;">${html}</body></html>`;
    navigator.clipboard.writeText(full).then(() => alert('HTMLコピー完了（CSS埋め込み済み）'));
  });
}
function savePDF() {
  const cssUrl = new URL('sign.css', location.href).href;
  const html = buildFull().replace('href="sign.css"', `href="${cssUrl}"`);
  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.print(); };
